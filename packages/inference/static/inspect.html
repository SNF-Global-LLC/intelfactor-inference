<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntelFactor 质检站 — Manual Inspection</title>
<style>
  :root {
    --pass: #2e7d32; --fail: #c62828; --review: #ef6c00;
    --bg: #f5f5f5; --card: #ffffff; --text: #212121; --muted: #757575;
    --border: #e0e0e0; --accent: #1565c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

  .header { background: #1b2a4a; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .nav { display: flex; gap: 12px; font-size: 13px; }
  .header a { color: rgba(255,255,255,0.7); text-decoration: none; }
  .header a:hover { color: white; }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* ── Controls ── */
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .controls input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
  .controls input:focus { outline: none; border-color: var(--accent); }
  .btn-inspect { background: var(--accent); color: white; border: none; padding: 12px 32px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn-inspect:hover { opacity: 0.9; }
  .btn-inspect:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Main layout ── */
  .main { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

  /* ── Image panel ── */
  .image-panel { background: var(--card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
  .image-panel .placeholder { display: flex; align-items: center; justify-content: center; min-height: 400px; color: var(--muted); font-size: 16px; text-align: center; padding: 20px; }
  .image-panel img { width: 100%; height: auto; display: block; }
  .img-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .img-tab { padding: 7px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .img-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* ── Verdict banner ── */
  .verdict-banner { padding: 16px 20px; text-align: center; font-size: 28px; font-weight: 700; color: white; display: none; }
  .verdict-PASS { background: var(--pass); display: block; }
  .verdict-FAIL { background: var(--fail); display: block; }
  .verdict-REVIEW { background: var(--review); display: block; }
  .verdict-ERROR { background: #616161; display: block; }

  /* ── Side panel ── */
  .side-panel { display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
  .card-title { padding: 10px 16px; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--border); }
  .card-body { padding: 12px 16px; font-size: 14px; }

  /* ── Detections table ── */
  .det-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .det-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 500; }
  .det-table td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
  .sev-high { color: var(--fail); font-weight: 600; }
  .sev-med { color: var(--review); font-weight: 600; }
  .sev-low { color: var(--pass); }

  /* ── Timing ── */
  .timing { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .timing .stat { text-align: center; }
  .timing .stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
  .timing .stat-label { font-size: 11px; color: var(--muted); }

  /* ── Feedback ── */
  .feedback { display: flex; gap: 8px; }
  .btn-accept { background: var(--pass); color: white; border: none; padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  .btn-reject { background: var(--fail); color: white; border: none; padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  .btn-accept:hover, .btn-reject:hover { opacity: 0.9; }
  .btn-accept:disabled, .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }
  .feedback-status { font-size: 13px; color: var(--muted); margin-top: 8px; }

  /* ── History ── */
  .history-list { max-height: 200px; overflow-y: auto; }
  .history-item { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 12px; display: flex; justify-content: space-between; cursor: pointer; }
  .history-item:hover { background: #f5f5f5; }
  .history-item .verdict-tag { padding: 1px 6px; border-radius: 3px; color: white; font-size: 11px; font-weight: 600; }
  .tag-PASS { background: var(--pass); }
  .tag-FAIL { background: var(--fail); }
  .tag-REVIEW { background: var(--review); }

  .spinner { display: none; }
  .spinner.active { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Status bar ── */
  .status-bar { background: #0d1b33; border-bottom: 1px solid #2a3a5c; padding: 6px 20px; display: flex; gap: 16px; flex-wrap: wrap; }
  .status-badge { font-size: 12px; color: rgba(255,255,255,0.6); }
  .status-badge b { color: rgba(255,255,255,0.9); }
  .status-badge.ready b { color: #66bb6a; }
  .status-badge.warn b { color: #ffa726; }

  /* ── Verdict ── */
  .verdict-label { font-size: 28px; font-weight: 700; line-height: 1.2; }
  .verdict-conf { font-size: 13px; font-weight: 400; margin-top: 3px; opacity: 0.85; }
  .verdict-meta { font-size: 11px; margin-top: 2px; opacity: 0.7; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="header">
  <h1>IntelFactor 质检站 — Manual QC</h1>
  <div class="nav">
    <a href="/status">Station Status</a>
    <a href="/inspect" style="color:white;font-weight:600">Inspect</a>
  </div>
</div>
<div class="status-bar">
  <span class="status-badge" id="badgeStation"><b>Station: </b><span id="badgeStationVal">—</span></span>
  <span class="status-badge" id="badgeCamera"><b>Camera: </b><span id="badgeCameraVal">—</span></span>
  <span class="status-badge" id="badgeModel"><b>Model: </b><span id="badgeModelVal">—</span></span>
  <span class="status-badge ready" id="badgeReady"><b id="badgeReadyVal">Connecting…</b></span>
</div>

<div class="container">
  <!-- Controls -->
  <div class="controls">
    <input type="text" id="productId" placeholder="Product ID (optional)" style="width:180px">
    <input type="text" id="operatorId" placeholder="Operator ID (optional)" style="width:160px">
    <button class="btn-inspect" id="btnInspect" onclick="runInspection()">
      Inspect <span class="spinner" id="spinner"></span>
    </button>
  </div>

  <div class="main">
    <!-- Image Panel -->
    <div class="image-panel">
      <div id="verdictBanner" class="verdict-banner"></div>
      <div id="imgTabs" class="img-tabs" style="display:none">
        <button class="img-tab active" id="tabAnnotated" onclick="showTab('annotated')">Annotated</button>
        <button class="img-tab" id="tabOriginal" onclick="showTab('original')">Original</button>
      </div>
      <div id="imagePlaceholder" class="placeholder">Place product under camera, then click "Inspect"</div>
      <img id="inspectImage" style="display:none" alt="Inspection result">
    </div>

    <!-- Side Panel -->
    <div class="side-panel">
      <!-- Timing -->
      <div class="card" id="timingCard" style="display:none">
        <div class="card-title">Timing</div>
        <div class="card-body">
          <div class="timing">
            <div class="stat"><div class="stat-val" id="captureMs">-</div><div class="stat-label">Capture (ms)</div></div>
            <div class="stat"><div class="stat-val" id="inferenceMs">-</div><div class="stat-label">Inference (ms)</div></div>
            <div class="stat"><div class="stat-val" id="totalMs">-</div><div class="stat-label">Total (ms)</div></div>
            <div class="stat"><div class="stat-val" id="numDets">-</div><div class="stat-label">Detections</div></div>
          </div>
        </div>
      </div>

      <!-- Detections -->
      <div class="card" id="detectionsCard" style="display:none">
        <div class="card-title">Detections</div>
        <div class="card-body">
          <table class="det-table">
            <thead><tr><th>Defect</th><th>Conf</th><th>Severity</th></tr></thead>
            <tbody id="detBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Feedback -->
      <div class="card" id="feedbackCard" style="display:none">
        <div class="card-title">Operator Feedback</div>
        <div class="card-body">
          <div class="feedback">
            <button class="btn-accept" id="btnAccept" onclick="sendFeedback('accepted')">Accept</button>
            <button class="btn-reject" id="btnReject" onclick="sendFeedback('rejected')">Reject</button>
          </div>
          <div class="feedback-status" id="feedbackStatus"></div>
        </div>
      </div>

      <!-- History -->
      <div class="card">
        <div class="card-title">Recent Inspections</div>
        <div class="card-body">
          <div class="history-list" id="historyList">
            <div style="color:var(--muted); font-size:13px;">No inspections yet</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentResult = null;
let currentTab = 'annotated';
const sessionHistory = [];

// ── Image tab toggle ────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.getElementById('tabAnnotated').classList.toggle('active', tab === 'annotated');
  document.getElementById('tabOriginal').classList.toggle('active', tab === 'original');
  if (!currentResult) return;
  const img = document.getElementById('inspectImage');
  const url = tab === 'annotated'
    ? currentResult.image_annotated_url
    : currentResult.image_original_url;
  if (url) {
    img.src = url + '?t=' + Date.now();
  }
}

// ── Main inspection call ────────────────────────────────────────────
async function runInspection() {
  const btn = document.getElementById('btnInspect');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  spinner.classList.add('active');

  document.getElementById('feedbackStatus').textContent = '';
  document.getElementById('btnAccept').disabled = false;
  document.getElementById('btnReject').disabled = false;

  const body = {};
  const pid = document.getElementById('productId').value.trim();
  const oid = document.getElementById('operatorId').value.trim();
  if (pid) body.product_id = pid;
  if (oid) body.operator_id = oid;

  try {
    const resp = await fetch('/api/inspect', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || resp.statusText);
    }
    const data = await resp.json();
    currentResult = data;
    currentTab = 'annotated';
    renderResult(data);
    addToHistory(data);
  } catch (err) {
    alert('Inspection failed: ' + err.message);
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
  }
}

// ── Render result into UI ───────────────────────────────────────────
function renderResult(r) {
  // Verdict banner
  const banner = document.getElementById('verdictBanner');
  const verdict = r.verdict || r.decision || 'UNKNOWN';
  banner.className = 'verdict-banner verdict-' + verdict;
  const confPct = ((r.confidence || 0) * 100).toFixed(0) + '%';
  const iid = r.inspection_id || '';
  const ts = r.timestamp ? new Date(r.timestamp).toLocaleTimeString() : '';
  banner.innerHTML = '<div class="verdict-label">' + verdict + '</div>'
    + '<div class="verdict-conf">Confidence: ' + confPct + '</div>'
    + (iid ? '<div class="verdict-meta">' + iid + (ts ? '  ·  ' + ts : '') + '</div>' : '');

  // Image
  const img = document.getElementById('inspectImage');
  const placeholder = document.getElementById('imagePlaceholder');
  const tabs = document.getElementById('imgTabs');
  const annotatedUrl = r.image_annotated_url;
  const originalUrl = r.image_original_url;

  if (annotatedUrl || originalUrl) {
    const srcUrl = (currentTab === 'annotated' ? annotatedUrl : originalUrl) || annotatedUrl || originalUrl;
    img.onload = null;
    img.onerror = function() {
      // If annotated 404s, fall back to original
      if (currentTab === 'annotated' && originalUrl) {
        img.src = originalUrl + '?t=' + Date.now();
        img.onerror = function() {
          img.style.display = 'none';
          placeholder.style.display = 'flex';
          placeholder.textContent = 'Image saved to disk but not available via HTTP (evidence write may need OpenCV).';
        };
      } else {
        img.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.textContent = 'Image not available';
      }
    };
    img.src = srcUrl + '?t=' + Date.now();
    img.style.display = 'block';
    placeholder.style.display = 'none';
    tabs.style.display = (annotatedUrl && originalUrl) ? 'flex' : 'none';
    // Reset tab buttons
    document.getElementById('tabAnnotated').classList.toggle('active', currentTab === 'annotated');
    document.getElementById('tabOriginal').classList.toggle('active', currentTab === 'original');
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.textContent = r.error || 'No image — capture backend returned no evidence path.';
    tabs.style.display = 'none';
  }

  // Timing
  const t = r.timing || {};
  document.getElementById('timingCard').style.display = '';
  document.getElementById('captureMs').textContent = (t.capture_ms || 0).toFixed(0);
  document.getElementById('inferenceMs').textContent = (t.inference_ms || 0).toFixed(0);
  document.getElementById('totalMs').textContent = (t.total_ms || 0).toFixed(0);
  document.getElementById('numDets').textContent = r.num_detections || 0;

  // Detections table
  const tbody = document.getElementById('detBody');
  tbody.innerHTML = '';
  if (r.detections && r.detections.length > 0) {
    document.getElementById('detectionsCard').style.display = '';
    r.detections.forEach(d => {
      const tr = document.createElement('tr');
      const sevClass = d.severity >= 0.7 ? 'sev-high' : d.severity >= 0.4 ? 'sev-med' : 'sev-low';
      tr.innerHTML = '<td>' + (d.defect_type || '?') + '</td>'
        + '<td>' + ((d.confidence || 0) * 100).toFixed(0) + '%</td>'
        + '<td class="' + sevClass + '">' + ((d.severity || 0) * 100).toFixed(0) + '%</td>';
      tbody.appendChild(tr);
    });
  } else {
    document.getElementById('detectionsCard').style.display = '';
    tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted);text-align:center">No defects detected</td></tr>';
  }

  // Feedback (only for FAIL/REVIEW)
  document.getElementById('feedbackCard').style.display =
    (verdict === 'FAIL' || verdict === 'REVIEW') ? '' : 'none';
}

// ── Operator feedback ───────────────────────────────────────────────
async function sendFeedback(action) {
  if (!currentResult) return;
  const oid = document.getElementById('operatorId').value.trim();

  document.getElementById('btnAccept').disabled = true;
  document.getElementById('btnReject').disabled = true;

  try {
    const resp = await fetch('/api/inspect/' + currentResult.inspection_id + '/feedback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: action, operator_id: oid || 'anonymous'}),
    });
    const data = await resp.json();
    document.getElementById('feedbackStatus').textContent =
      data.status === 'recorded' ? '✓ Feedback recorded: ' + action : (data.error || 'Unknown error');
  } catch (err) {
    document.getElementById('feedbackStatus').textContent = 'Failed: ' + err.message;
    document.getElementById('btnAccept').disabled = false;
    document.getElementById('btnReject').disabled = false;
  }
}

// ── History ─────────────────────────────────────────────────────────
function addToHistory(r) {
  sessionHistory.unshift(r);
  if (sessionHistory.length > 50) sessionHistory.pop();
  renderHistory(sessionHistory);
}

function renderHistory(items) {
  const list = document.getElementById('historyList');
  if (!items || items.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px;">No inspections yet</div>';
    return;
  }
  list.innerHTML = '';
  items.forEach(h => {
    const div = document.createElement('div');
    div.className = 'history-item';
    const verdict = h.verdict || h.decision || '?';
    const ts = h.timestamp ? new Date(h.timestamp).toLocaleTimeString() : '';
    const pid = h.product_id || '';
    div.innerHTML = '<span>' + ts + (pid ? ' — ' + pid : '') + '</span>'
      + '<span class="verdict-tag tag-' + verdict + '">' + verdict + '</span>';
    div.onclick = () => { currentResult = h; currentTab = 'annotated'; renderResult(h); };
    list.appendChild(div);
  });
}

async function loadHistory() {
  try {
    const resp = await fetch('/api/inspections?limit=20');
    if (!resp.ok) return;
    const data = await resp.json();
    // Map DB records to the shape renderResult expects
    const items = (data.inspections || []).map(e => ({
      ...e,
      verdict: e.decision || e.verdict,
      image_annotated_url: '/api/inspections/' + e.inspection_id + '/annotated.jpg',
      image_original_url: '/api/inspections/' + e.inspection_id + '/original.jpg',
    }));
    renderHistory(items);
  } catch (_) {}
}

// ── Status badges ───────────────────────────────────────────────────
async function loadStatus() {
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) {
      document.getElementById('badgeReadyVal').textContent = 'API unavailable';
      document.getElementById('badgeReady').className = 'status-badge warn';
      return;
    }
    const d = await resp.json();

    document.getElementById('badgeStationVal').textContent = d.station_id || '—';

    // Camera badge
    const camBackend = d.camera_backend || 'unknown';
    const camConnected = d.camera_connected;
    const camLabel = camBackend === 'disabled' ? 'disabled'
      : camConnected ? camBackend : camBackend + ' (not connected)';
    document.getElementById('badgeCameraVal').textContent = camLabel;
    document.getElementById('badgeCamera').className =
      'status-badge' + (camConnected || camBackend === 'disabled' ? '' : ' warn');

    // Model badge
    const visionKey = d.vision_model_key || d.vision_backend || '—';
    const isStub = d.vision_is_stub;
    document.getElementById('badgeModelVal').textContent =
      isStub ? 'stub (dev)' : visionKey;
    document.getElementById('badgeModel').className =
      'status-badge' + (isStub ? ' warn' : '');

    // Ready badge
    const captureReady = camConnected || camBackend === 'disabled';
    document.getElementById('badgeReadyVal').textContent = captureReady ? 'Ready' : 'Camera not connected';
    document.getElementById('badgeReady').className =
      'status-badge' + (captureReady ? ' ready' : ' warn');
  } catch (_) {
    document.getElementById('badgeReadyVal').textContent = 'Offline';
    document.getElementById('badgeReady').className = 'status-badge warn';
  }
}

// ── Init ────────────────────────────────────────────────────────────
loadHistory();
loadStatus();
</script>
</body>
</html>
