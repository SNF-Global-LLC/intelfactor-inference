# IntelFactor.ai — Wiko Cutlery Defect Taxonomy
# 13 defect types from production deployment at Wiko Cutlery (Yangjiang).
# Used by: RCA explainer (Layer 3), Action Recommender (Layer 4), Operator UI.
#
# Each defect type includes:
#   description_zh / description_en: Operator-facing description
#   common_causes: Known root causes for RCA correlation
#   severity_range: [min, max] for classification
#   sop_section: Linked SOP reference for corrective action
#   detection_zone: Where on the product this defect typically appears

defects:
  blade_scratch:
    description_zh: "刀片划痕"
    description_en: "Blade scratch"
    common_causes:
      - "Grinding wheel wear or contamination"
      - "Conveyor belt debris"
      - "Polishing compound residue"
      - "Handling damage during transfer"
    severity_range: [0.2, 0.9]
    sop_section: "SOP 4.2.3"
    detection_zone: "blade_body"
    process_parameters: ["grinding_rpm", "polishing_pressure", "belt_speed"]

  grinding_mark:
    description_zh: "研磨痕迹"
    description_en: "Grinding mark"
    common_causes:
      - "Grinding wheel wear or contamination"
      - "Uneven grinding pressure"
      - "Normal satin finish misread as defect"
    severity_range: [0.2, 0.9]
    sop_section: "SOP 4.2.3"
    detection_zone: "blade_body"
    process_parameters: ["grinding_rpm", "grinding_pressure", "belt_speed"]

  surface_dent:
    description_zh: "表面凹痕"
    description_en: "Surface dent or depression"
    common_causes:
      - "Impact during handling or transport"
      - "Press alignment drift"
      - "Fixture damage"
    severity_range: [0.3, 0.9]
    sop_section: "SOP 3.2.4"
    detection_zone: "blade_body"
    process_parameters: ["press_alignment", "fixture_condition", "handling_method"]

  surface_crack:
    description_zh: "表面裂纹"
    description_en: "Surface crack"
    common_causes:
      - "Material stress from heat treatment"
      - "Quenching too rapid"
      - "Material inclusion defect"
      - "Grinding thermal damage"
    severity_range: [0.7, 1.0]
    sop_section: "SOP 2.1.1"
    detection_zone: "any"
    process_parameters: ["quench_rate", "tempering_temp", "grinding_rpm"]

  weld_defect:
    description_zh: "焊接缺陷"
    description_en: "Weld defect"
    common_causes:
      - "Weld seam contamination"
      - "Uneven heat input"
      - "Poor surface preparation"
    severity_range: [0.4, 1.0]
    sop_section: "SOP 4.6.2"
    detection_zone: "blade_bolster_junction"
    process_parameters: ["weld_current", "weld_speed", "surface_preparation"]

  edge_burr:
    description_zh: "刃口毛刺"
    description_en: "Edge burr"
    common_causes:
      - "Stamping die wear"
      - "Insufficient deburring pass"
      - "Cutting tool dullness"
    severity_range: [0.3, 0.8]
    sop_section: "SOP 3.4.2"
    detection_zone: "edge_perimeter"
    process_parameters: ["die_cycles", "deburring_passes", "cutting_pressure"]

  edge_crack:
    description_zh: "刃口裂纹"
    description_en: "Edge crack"
    common_causes:
      - "Sharpening stone misalignment"
      - "Edge finishing tool wear"
      - "Quenching stress near cutting edge"
    severity_range: [0.7, 1.0]
    sop_section: "SOP 4.3.1"
    detection_zone: "cutting_edge"
    process_parameters: ["sharpening_angle", "stone_grit", "finishing_speed"]

  handle_defect:
    description_zh: "刀柄缺陷"
    description_en: "Handle crack, split, or molding defect"
    common_causes:
      - "Injection molding temperature too high"
      - "Material drying insufficient"
      - "Rivet over-torque"
      - "Drop damage"
    severity_range: [0.5, 1.0]
    sop_section: "SOP 6.2.1"
    detection_zone: "handle_body"
    process_parameters: ["mold_temp", "material_moisture", "rivet_torque"]

  bolster_gap:
    description_zh: "护手间隙"
    description_en: "Gap between bolster, handle, and blade tang"
    common_causes:
      - "Handle molding tolerance drift"
      - "Rivet tension insufficient"
      - "Adhesive cure time too short"
      - "Tang dimension out of spec"
    severity_range: [0.3, 0.8]
    sop_section: "SOP 6.1.3"
    detection_zone: "handle_junction"
    process_parameters: ["mold_temp", "rivet_torque", "cure_time"]

  etching_defect:
    description_zh: "蚀刻/商标缺陷"
    description_en: "Etching or logo defect"
    common_causes:
      - "Laser marking alignment drift"
      - "Etching depth inconsistency"
      - "Surface preparation insufficient"
      - "Fixture positioning error"
    severity_range: [0.2, 0.6]
    sop_section: "SOP 7.1.1"
    detection_zone: "blade_flat"
    process_parameters: ["laser_power", "marking_speed", "focus_distance"]

  inclusion:
    description_zh: "夹杂物/污染"
    description_en: "Inclusion or foreign material contamination"
    common_causes:
      - "Raw material inclusion"
      - "Cleaning process failure"
      - "Environmental contamination"
      - "Previous process residue"
    severity_range: [0.2, 0.9]
    sop_section: "SOP 5.3.1"
    detection_zone: "any"
    process_parameters: ["cleaning_concentration", "rinse_cycles", "air_quality"]

  surface_discolor:
    description_zh: "表面变色"
    description_en: "Surface discoloration or color inconsistency"
    common_causes:
      - "Heat treatment temperature variation"
      - "Uneven tempering"
      - "Chemical residue from cleaning"
      - "Oxidation during cooling"
    severity_range: [0.2, 0.7]
    sop_section: "SOP 5.2.1"
    detection_zone: "blade_body"
    process_parameters: ["tempering_temp", "cooling_rate", "cleaning_concentration"]

  overgrind:
    description_zh: "过磨/尺寸偏差"
    description_en: "Over-grind or dimensional error"
    common_causes:
      - "Grinding wheel diameter decrease"
      - "Asymmetric grinding pressure"
      - "CNC program drift"
      - "Measurement fixture calibration"
    severity_range: [0.4, 1.0]
    sop_section: "SOP 4.6.5"
    detection_zone: "full_blade"
    process_parameters: ["grinding_wheel_diameter", "grinding_pressure", "cnc_offset"]


# SOP Section Reference (for Action Recommender Layer 4)
sop_sections:
  "SOP 2.1.1": "Material Inspection & Incoming QC"
  "SOP 2.3.1": "Dimensional Verification Procedure"
  "SOP 3.1.2": "Stamping & Forming Process Control"
  "SOP 3.2.4": "Press Alignment & Fixture Maintenance"
  "SOP 3.4.2": "Deburring & Edge Finishing"
  "SOP 4.2.3": "Grinding Wheel Maintenance & Calibration"
  "SOP 4.3.1": "Sharpening & Edge Finishing QC"
  "SOP 4.6.2": "Weld Seam Inspection"
  "SOP 4.6.5": "Dimensional Grinding Control"
  "SOP 5.1.1": "Corrosion Prevention & Passivation"
  "SOP 5.2.1": "Heat Treatment Process Control"
  "SOP 5.3.1": "Cleaning & Contamination Control"
  "SOP 6.1.3": "Handle Assembly & Fitment"
  "SOP 6.2.1": "Handle Material & Injection Molding"
  "SOP 7.1.1": "Logo Marking & Branding QC"

# Process Parameters (for Correlator Layer 2 / edge.yaml)
process_parameters:
  grinding_rpm:
    unit: "RPM"
    target: 3000
    tolerance: 50
    description_zh: "研磨转速"
    description_en: "Grinding wheel RPM"

  polishing_pressure:
    unit: "bar"
    target: 2.5
    tolerance: 0.3
    description_zh: "抛光压力"
    description_en: "Polishing pressure"

  tempering_temp:
    unit: "°C"
    target: 200
    tolerance: 10
    description_zh: "回火温度"
    description_en: "Tempering temperature"

  sharpening_angle:
    unit: "degrees"
    target: 15
    tolerance: 1
    description_zh: "磨刃角度"
    description_en: "Sharpening angle"

  rivet_torque:
    unit: "Nm"
    target: 8.5
    tolerance: 0.5
    description_zh: "铆钉扭矩"
    description_en: "Rivet torque"

  mold_temp:
    unit: "°C"
    target: 230
    tolerance: 10
    description_zh: "模具温度"
    description_en: "Injection mold temperature"

  passivation_time:
    unit: "min"
    target: 30
    tolerance: 5
    description_zh: "钝化时间"
    description_en: "Passivation bath time"

  storage_humidity:
    unit: "%RH"
    target: 45
    tolerance: 10
    description_zh: "仓储湿度"
    description_en: "Storage humidity"
