# IntelFactor.ai — Station Configuration
# Copy this file to /opt/intelfactor/config/station.yaml and customize.

# ── Deployment Mode ────────────────────────────────────────────────────
# station_only: all inference + RCA runs on this device
# station_plus_hub: realtime on station, heavy analysis on site hub
mode: station_only

# ── Station Identity ───────────────────────────────────────────────────
station_id: station_1
factory_id: wiko_yangjiang_main

# ── Paths ──────────────────────────────────────────────────────────────
data_dir: /opt/intelfactor/data
model_dir: /opt/intelfactor/models
edge_yaml_path: /opt/intelfactor/config/edge.yaml

# ── Vision Inference ───────────────────────────────────────────────────
# Leave blank for auto-detection based on hardware.
# Options: yolov8n_trt, yolov8s_trt, yolo26_trt
vision_model: ~
confidence_threshold: 0.5
nms_threshold: 0.45

# ── Model Bundle Configuration ─────────────────────────────────────────
# Standard model bundle contract for production knife-inspection models.
# Bundle contains: model.engine, labels.json, thresholds.yaml, metadata.json
model_bundle:
  # Path to model bundle directory (relative to model_dir or absolute)
  path: "models/kyoto-yolo26n-v1"
  
  # Individual file paths (relative to bundle path or absolute)
  engine: "model.engine"           # TensorRT engine file
  labels: "labels.json"            # Class ID -> name mapping
  thresholds: "thresholds.yaml"    # Per-class confidence thresholds
  metadata: "metadata.json"        # Model version, info, etc.
  
  # Validation behavior
  validate_on_load: true           # Fail loudly if bundle inconsistent
  strict_taxonomy: true            # Enforce exact match with defect_classes below
# Canonical source: configs/wiko_taxonomy.yaml — key order = model class IDs — do not reorder
defect_classes:
  - blade_scratch       # 0  major   4.6.1
  - grinding_mark       # 1  major   4.6.1
  - surface_dent        # 2  major   4.6.1
  - surface_crack       # 3  critical 4.6.1
  - weld_defect         # 4  major   4.6.2
  - edge_burr           # 5  critical 4.6.8
  - edge_crack          # 6  critical 4.6.8
  - handle_defect       # 7  major   4.6.4
  - bolster_gap         # 8  major   4.6.3
  - etching_defect      # 9  critical 4.6.9
  - inclusion           # 10 major   4.6.1
  - surface_discolor    # 11 minor   4.6.1
  - overgrind           # 12 major   4.6.5

# ── Language Model (RCA) ──────────────────────────────────────────────
# Leave blank for auto-detection.
# Options: qwen25_3b_int4, phi3_mini_int4, qwen25_7b_int4,
#          qwen25_7b_vllm, qwen25_20b_vllm
language_model: ~
temperature: 0.3

# ── RCA Pipeline ──────────────────────────────────────────────────────
rca:
  anomaly_check_interval_sec: 300    # 5 minutes
  z_score_threshold: 2.5
  min_events_for_baseline: 20
  window_hours: 4.0

# ── Site Hub (station_plus_hub mode only) ─────────────────────────────
hub:
  url: http://hub.local:8080
  language_model: ~                  # auto-detect (biggest available)
  review_queue_enabled: true
  cross_line_rca_enabled: true

# ── Process Parameters (override from edge.yaml) ─────────────────────
# These are normally loaded from the SOP compiler output in edge.yaml.
# Manual overrides here take precedence.
process_parameters:
  grinding_rpm:
    unit: RPM
    target: 3000
    tolerance: 50
    data_source: mqtt              # mqtt | manual | opcua
    mqtt_topic: station_1/grinding/rpm
  grinding_temp:
    unit: "°C"
    target: 45
    tolerance: 5
    data_source: manual
  polishing_pressure:
    unit: bar
    target: 2.5
    tolerance: 0.3
    data_source: manual

# ── SOP Mapping ──────────────────────────────────────────────────────
sop_map:
  parameter_sops:
    grinding_rpm: "SOP 4.2.3"
    grinding_temp: "SOP 4.2.5"
    polishing_pressure: "SOP 5.1.2"
  defect_sops:
    blade_scratch:     "SOP 4.2.3"
    grinding_mark:     "SOP 4.2.3"
    surface_dent:      "SOP 3.2.4"
    surface_crack:     "SOP 2.1.1"
    weld_defect:       "SOP 4.6.2"
    edge_burr:         "SOP 3.4.2"
    edge_crack:        "SOP 4.3.1"
    handle_defect:     "SOP 6.2.1"
    bolster_gap:       "SOP 6.1.3"
    etching_defect:    "SOP 7.1.1"
    inclusion:         "SOP 5.3.1"
    surface_discolor:  "SOP 5.2.1"
    overgrind:         "SOP 4.6.5"
  default_section: "SOP (refer to quality manual)"

# ── Machine Health Copilot ────────────────────────────────────────────
machine_health:
  enabled: true
  assets:
    - machine_id: vacuum-chamber-01
      asset_type: vacuum-chamber
      display_name: "Vacuum Chamber #1"
      sensors: [current]
    - machine_id: grinding-spindle-01
      asset_type: grinding-spindle
      display_name: "Grinding Spindle #1"
      sensors: [vibration, current]
    - machine_id: injection-moulder-01
      asset_type: injection-moulder
      display_name: "Injection Moulder #1"
      sensors: [current, vibration]
  thresholds:
    warning: 2.0
    critical: 3.5
  sop_map:
    grinding-spindle:
      vibration: "SOP 4.2.3 — Inspect spindle bearings"
      current: "SOP 4.3.1 — Check motor drive"
    vacuum-chamber:
      current: "SOP 7.1.2 — Inspect vacuum pump"
    injection-moulder:
      current: "SOP 8.2.1 — Check hydraulic pump"
      vibration: "SOP 8.2.4 — Inspect barrel bearings"

# ── Monitoring ───────────────────────────────────────────────────────
monitoring:
  prometheus_port: 9090
  health_check_port: 8081
  log_level: INFO
