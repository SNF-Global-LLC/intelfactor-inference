# IntelFactor.ai — Edge-Only Deployment
# Runs everything on a single NVIDIA Jetson or GPU server.
# No cloud dependencies. Dashboard + API served locally.
#
# Quick start:
#   cp .env.example .env && nano .env
#   docker compose up -d
#   curl http://localhost:8080/health
#
# Dashboard: http://<edge-ip>:8080
# API docs:  see CLAUDE.md or docs/JETSON_QUICKSTART.md

services:

  # ── Station Runtime (Inference + RCA + Evidence + API) ───────────
  station:
    build:
      context: ../..
      dockerfile: deploy/edge-only/Dockerfile
    container_name: intelfactor-station
    restart: unless-stopped
    runtime: nvidia

    environment:
      # Storage
      STORAGE_MODE: local
      SQLITE_DB_PATH: ${DB_PATH:-/data/local.db}
      DB_PATH: ${DB_PATH:-/data/local.db}
      EVIDENCE_DIR: ${EVIDENCE_DIR:-/data/evidence}

      # Station identity
      STATION_ID: ${STATION_ID:-station_01}

      # Camera
      CAMERA_PROTOCOL: ${CAMERA_PROTOCOL:-file}
      CAMERA_URI: ${CAMERA_URI:-/data/sample_images}

      # API server
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8080}

      # Model paths (inside container — maps to host MODELS_DIR)
      VISION_MODEL_PATH: /models/vision
      VISION_ENGINE_PATH: ${VISION_ENGINE_PATH:-/models/vision/yolov8n_fp16.engine}
      LLM_MODEL_PATH: ${LLM_MODEL_PATH:-/models/llm/qwen2.5-3b-instruct-q4_k_m.gguf}
      ENABLE_LOCAL_LLM: ${ENABLE_LOCAL_LLM:-false}

      # Evidence retention
      EVIDENCE_MAX_GB: ${EVIDENCE_MAX_GB:-50}

      # Cloud sync (optional — leave empty for edge-only)
      CLOUD_API_URL: ${CLOUD_API_URL:-}
      CLOUD_API_KEY: ${CLOUD_API_KEY:-}

    volumes:
      # Persistent data (DB + evidence)
      - ${DATA_DIR:-/opt/intelfactor/data}:/data
      # Model files from host (read-only)
      - ${MODELS_DIR:-/opt/intelfactor/models}:/models:ro
      # Camera device access (needed for USB/FLIR cameras)
      - /dev:/dev

    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx (optional: SSL termination) ────────────────────────────
