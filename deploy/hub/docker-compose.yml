# IntelFactor.ai — Site Hub Docker Compose
# Site Data Zone services: Postgres, MinIO, Prometheus, Grafana
#
# Usage:
#   cd deploy/hub
#   docker compose up -d
#
# Stations sync to this hub via SQLite → Postgres batch sync.
# All services are on-premises. No cloud dependencies.

services:

  # ── PostgreSQL — cross-line query store ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: intelfactor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: intelfactor
      POSTGRES_USER: intelfactor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelfactor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO — S3-compatible evidence + model artifact store ──────
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: intelfactor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-intelfactor}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?Set MINIO_PASSWORD in .env}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus — metrics collection ────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: intelfactor-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.path=/prometheus'

  # ── Grafana — dashboards + alerting ────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: intelfactor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Sync Service — pulls station SQLite data into Postgres ─────
  sync:
    build:
      context: ../..
      dockerfile: deploy/hub/Dockerfile.sync
    container_name: intelfactor-sync
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://intelfactor:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/intelfactor
      SYNC_INTERVAL_SEC: "300"
      STATION_DATA_DIR: /station-data
    volumes:
      - ${STATION_DATA_DIR:-/opt/intelfactor/station-sync}:/station-data:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
  prom_data:
  grafana_data:
