AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IntelFactor Tailscale log streaming destination (S3).
  Creates the S3 bucket and cross-account IAM role used by Tailscale
  to stream audit logs. This is the "b-destination" (backup/secondary)
  log sink.

Parameters:
  TailscaleAwsAccountId:
    Type: String
    Description: AWS account ID that Tailscale uses to assume the streaming role
    Default: "891612552178"
  TailscaleExternalId:
    Type: String
    Description: Tailscale-provided ExternalId for sts:AssumeRole
    Default: "595e5b29-d3e5-4bb9-b998-29836cc555dc"
  LogBucketName:
    Type: String
    Description: Name of the S3 bucket for Tailscale audit logs
    Default: intelfactor-audit-logs
  LogPrefix:
    Type: String
    Description: S3 object key prefix for streamed logs
    Default: tailscale/
  RetentionDays:
    Type: Number
    Description: Number of days to retain logs before transition to Glacier
    Default: 30

Resources:
  # ── S3 Bucket for Tailscale Audit Logs ─────────────────────────────────
  TailscaleLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref LogBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transition:
              StorageClass: GLACIER
              TransitionInDays: !Ref RetentionDays
          - Id: AbortIncompleteMultipartUpload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: intelfactor
        - Key: Component
          Value: tailscale-log-streaming

  TailscaleLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TailscaleLogBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowTailscaleLogStreaming
            Effect: Allow
            Principal:
              AWS: !GetAtt TailscaleLogStreamingRole.Arn
            Action:
              - s3:PutObject
              - s3:AbortMultipartUpload
            Resource: !Sub "arn:aws:s3:::${LogBucketName}/${LogPrefix}*"

  # ── IAM Role for Tailscale Log Streaming ───────────────────────────────
  TailscaleLogStreamingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IntelfactorLogStreamingRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TailscaleAwsAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref TailscaleExternalId
      Policies:
        - PolicyName: TailscaleLogStreamingPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource: !Sub "arn:aws:s3:::${LogBucketName}/${LogPrefix}*"

Outputs:
  BucketArn:
    Description: ARN of the Tailscale audit log S3 bucket
    Value: !GetAtt TailscaleLogBucket.Arn
  BucketName:
    Description: Name of the Tailscale audit log S3 bucket
    Value: !Ref TailscaleLogBucket
  StreamingRoleArn:
    Description: ARN of the IAM role Tailscale assumes for log streaming
    Value: !GetAtt TailscaleLogStreamingRole.Arn
